    layout: text
    content: |
      Mas alla del codigo, me apasiona la interseccion entre tecnologia
      y comunidad:

      - **Bitcoin:** Nodo propio activo, comunidad local y educacion financiera.
      - **IA:** Siempre experimentando con nuevas herramientas (n8n, Cursor, Claude).
      - **Mentoria:** Me gusta compartir conocimiento y ayudar a otros a crecer tecnicamente.

