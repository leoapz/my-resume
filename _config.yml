# About Section
about_profile_image: images/profile.jpg
about_content: |
  Ingeniero de Software Senior especializado en Calidad (SDET) y Automatización
  de Backend. Experto en optimizar estrategias de testing mediante Playwright/TypeScript y en el diseño de herramientas de observabilidad
  inteligente con IA (n8n, RAG Agents). Enfocado en reducir el Time-to-Market
  y mitigar riesgos financieros en sistemas distribuidos de alto tráfico.

  Habilidades principales: <mark>Playwright</mark> <mark>TypeScript</mark>
  <mark>n8n</mark> <mark>RAG Agents</mark> <mark>CI/CD</mark>

content:
  - title: Habilidades Técnicas
    layout: text
    content: |
      - **Lenguajes:** TypeScript, JavaScript, Python, SQL, Go (Básico).
      - **Automation Frameworks:** Playwright (Experto), Cypress, Selenium, Jest, Appium.
      - **Ingeniería de IA & Herramientas:** Flujos n8n, Agentes RAG,
        Integración de LLMs para QA, Cursor, Claude Code.
      - **Infraestructura & CI/CD:** Docker, AWS (Fury), GitHub Actions, Jenkins, Datadog.
      - **Metodologías:** Scrum, Kanban, Shift-Left Testing, Pair Programming.

  - title: Experiencia Laboral
    layout: list
    content:
      - layout: left
        title: MercadoLibre
        link: mercadolibre.com
        sub_title: Senior Software Engineer in Test (SDET)
        caption: Enero 2023 – Febrero 2026
        quote: >
          Ingeniero de Calidad Core para el equipo de Shipping, responsable
          de la lógica de precios y promesas de entrega en más de 5 países.
        description: |
          - Lideré la estrategia de calidad para el motor de envíos (Shipping),
            asegurando la confiabilidad de cálculos de precios y promesas de
            entrega en más de 5 países.
          - Migré las suites de prueba legacy a **Playwright + TypeScript**, estabilizando *flaky tests* y
            reduciendo el tiempo de feedback en CI/CD de 50 a **15 minutos**.
          - Diseñé e implementé un sistema de auditoría automatizado utilizando
            **n8n y Agentes RAG**, capaz de detectar anomalías en
            configuraciones de campañas financieras en tiempo real,
            previniendo pérdidas de ingresos.
          - Impulsé metodologías Shift-Left, mentoreando a desarrolladores
            en pruebas unitarias e integrando herramientas de IA (Cursor) para
            elevar la calidad del código desde el inicio.
          - Aumenté la cobertura de pruebas de integración del 40% al **80%**,
            enfocando la estrategia en APIs y microservicios para reducir la
            dependencia de la UI.

      - layout: left
        title: GeoPagos
        link: geopagos.com
        sub_title: QA Automation Engineer
        caption: Marzo 2021 – Diciembre 2022
        quote: >
          Fintech líder en infraestructura de pagos digitales en Latinoamérica.
        description: |
          - Desarrollé un framework de automatización multiplataforma
            (Web/Mobile/API) utilizando **Cypress (TS) y Appium**, unificando
            los estándares de calidad para múltiples productos fintech.
          - Reduje la tasa de defectos en producción un **25%** mediante la
            implementación de *Smoke Tests* automáticos en los pipelines de
            integración continua.
          - Colaboré con equipos multidisciplinarios para definir criterios de
            aceptación (BDD), mejorando la trazabilidad entre requerimientos
            de negocio y casos de prueba.

      - layout: left
        title: Practia Global
        link: practia.global
        sub_title: Especialista QA Automation
        caption: Junio 2018 – Marzo 2021
        description: |
          - Diseñé y mantuve scripts de prueba automatizados con
            **Python y Robot Framework** para clientes bancarios, asegurando
            la estabilidad de plataformas transaccionales críticas.
          - Ejecuté pruebas de performance y validación de servicios SOAP/REST
            para sistemas core bancarios.

      - layout: left
        title: UTN - Dirección de Proyectos Informáticos
        sub_title: Full Stack Developer / Analista
        caption: Enero 2016 – Diciembre 2020
        description: |
          - Desarrollé sistemas de gestión gubernamental utilizando
            **React y Node.js**. Introduje las primeras prácticas de
            automatización de UI, reduciendo la carga operativa manual en un 20%.

  - title: Proyectos
    layout: list
    content:
      - layout: top-middle
        title: Club Satoshi - Comunidad Bitcoin en Tucumán
        link: https://www.clubsatoshi.org/
        quote: >
          Primera comunidad Bitcoiner de Tucumán.
        description: |
          Cofundador & Tech Lead. Lidero la comunidad local de Bitcoin en
          Tucumán. Mantengo la infraestructura de nodos propios y el
          desarrollo web. Organizo talleres técnicos sobre tecnología
          blockchain, soberanía financiera y seguridad.

      - layout: top-middle
        title: El Proximo - App de Transporte Interurbano
        link: https://elproximo.com.ar/
        quote: >
          Digitalizacion del transporte interurbano de Tucuman.
        description: |
          Aplicación Web para el transporte interurbano de Tucumán (Norte-Sur), centralizando horarios que las empresas mantenían exclusivamente en papel.
          Diseñé una arquitectura de base de datos relacional escalable que permite a los usuarios consultar el próximo servicio disponible en tiempo real según localidad y empresa, resolviendo la falta de información digital oficial y mejorando la experiencia de viaje de la comunidad.

